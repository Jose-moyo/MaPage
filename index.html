<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My link's - Stockage Interne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% -20%, rgba(59, 130, 246, 0.15) 0%, rgba(5, 5, 5, 0) 60%);
            pointer-events: none;
            z-index: -1;
        }

        .glass-card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.4);
            background: rgba(20, 20, 20, 0.9);
            transform: translateY(-5px) scale(1.02);
        }

        .search-input {
            background: rgba(20, 20, 20, 0.8) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            text-align: center;
        }

        .category-title {
            position: relative;
            display: inline-block;
        }
        .category-title::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 2px;
            background: #3b82f6;
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="bg-glow"></div>

    <!-- Modale de Connexion -->
    <div id="loginPage" class="hidden fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="glass-card p-6 rounded-3xl w-full max-w-[300px] border-white/10 shadow-2xl">
            <div class="text-center mb-6">
                <div class="w-10 h-10 bg-blue-600 rounded-lg mx-auto mb-3 flex items-center justify-center">
                    <i class="fas fa-user-shield text-lg text-white"></i>
                </div>
                <h2 class="text-lg font-bold text-white">Administration</h2>
            </div>
            <div class="space-y-3">
                <input type="text" id="loginUser" placeholder="Utilisateur" class="w-full p-2.5 rounded-xl outline-none search-input text-white text-xs">
                <input type="password" id="loginPass" placeholder="Mot de passe" class="w-full p-2.5 rounded-xl outline-none search-input text-white text-xs">
                <div id="loginError" class="text-red-400 text-[10px] hidden text-center">Identifiants incorrects.</div>
                <button id="submitLogin" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-2.5 rounded-xl transition-all text-xs">
                    Connexion
                </button>
                <button id="cancelLogin" class="w-full text-gray-500 py-1 text-[10px] font-bold uppercase tracking-wider">
                    Annuler
                </button>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="container mx-auto px-6 pt-6 max-w-7xl flex justify-between items-center relative z-20">
        <button id="goToLoginBtn" class="flex items-center gap-2 text-gray-500 hover:text-blue-500 transition-all font-bold text-[10px] uppercase tracking-widest">
            <i class="fas fa-lock p-2 bg-white/5 rounded-lg border border-white/10"></i>
            <span>ADMIN</span>
        </button>
        
        <div class="flex gap-4">
            <button id="addBtn" class="hidden bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-lg font-bold text-[10px] uppercase">
                <i class="fas fa-plus mr-1"></i> Ajouter
            </button>
            <button id="logoutBtn" class="hidden text-red-500/70 hover:text-red-500 font-bold text-[10px] uppercase tracking-widest">
                <i class="fas fa-power-off"></i>
            </button>
        </div>
    </div>

    <!-- Contenu Principal -->
    <div class="container mx-auto px-6 py-12 lg:py-16 max-w-7xl flex flex-col items-center">
        <header class="text-center mb-16">
            <h1 class="text-5xl lg:text-7xl font-black text-white mb-2">My link<span class="text-blue-500">'s</span></h1>
            <div id="adminLabel" class="hidden text-blue-500 text-[9px] font-black tracking-[0.4em] uppercase mb-4">MODE ADMINISTRATEUR</div>
            <p class="text-gray-500 font-medium">Stockage Local (Interne au navigateur)</p>
        </header>

        <div class="w-full max-w-2xl mb-20">
            <input type="text" id="searchInput" placeholder="Rechercher..." class="w-full px-8 py-5 rounded-2xl search-input text-white text-lg outline-none focus:border-blue-500/50 transition-all shadow-xl">
        </div>

        <div id="linksContainer" class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Les liens s'afficheront ici -->
        </div>
    </div>

    <!-- Modal d'Ajout -->
    <div id="addModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-50">
        <div class="glass-card p-8 rounded-3xl w-full max-w-md text-center">
            <h2 class="text-xl font-black text-white mb-6 uppercase tracking-widest">Nouveau Lien</h2>
            <div class="space-y-4">
                <input type="text" id="siteName" class="w-full p-4 rounded-xl outline-none search-input text-sm" placeholder="Nom">
                <input type="url" id="siteUrl" class="w-full p-4 rounded-xl outline-none search-input text-sm" placeholder="URL (https://...)">
                <select id="siteCategory" class="w-full p-4 rounded-xl outline-none search-input text-sm text-gray-400">
                    <option value="TRAVAIL">💼 TRAVAIL</option>
                    <option value="SOCIAL">🌐 RÉSEAUX SOCIAUX</option>
                    <option value="OUTILS">🛠️ OUTILS</option>
                    <option value="LOISIRS">🎮 LOISIRS</option>
                </select>
                <div class="flex gap-3 pt-4">
                    <button id="closeAddBtn" class="flex-1 text-gray-500 font-bold py-3">ANNULER</button>
                    <button id="saveLinkBtn" class="flex-[2] bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-600/20">ENREGISTRER</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- BASE DE DONNÉES INTERNE (localStorage) ---
        let allLinks = JSON.parse(localStorage.getItem('my_links_data')) || [];
        let isAdmin = sessionStorage.getItem('is_admin') === 'true';

        function saveData() {
            localStorage.setItem('my_links_data', JSON.stringify(allLinks));
            renderLinks();
        }

        function updateUI() {
            document.getElementById('addBtn').classList.toggle('hidden', !isAdmin);
            document.getElementById('logoutBtn').classList.toggle('hidden', !isAdmin);
            document.getElementById('adminLabel').classList.toggle('hidden', !isAdmin);
            document.getElementById('goToLoginBtn').classList.toggle('hidden', isAdmin);
            renderLinks();
        }

        function renderLinks(filter = "") {
            const container = document.getElementById('linksContainer');
            const filtered = allLinks.filter(l => 
                l.name.toLowerCase().includes(filter.toLowerCase()) || 
                l.category.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-gray-700 py-10 uppercase text-[10px] tracking-widest">Aucun lien enregistré</p>`;
                return;
            }

            container.innerHTML = "";
            const groups = filtered.reduce((acc, link) => {
                acc[link.category] = [...(acc[link.category] || []), link];
                return acc;
            }, {});

            Object.keys(groups).sort().forEach(cat => {
                const groupDiv = document.createElement('div');
                groupDiv.className = "col-span-full mb-10";
                groupDiv.innerHTML = `<div class="text-center mb-8"><h3 class="category-title text-[9px] font-black tracking-[0.3em] text-blue-500 uppercase">${cat}</h3></div>`;
                
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4";
                
                groups[cat].forEach((link, index) => {
                    const card = document.createElement('div');
                    card.className = "glass-card p-6 rounded-2xl relative h-[140px] flex flex-col items-center justify-center group";
                    card.innerHTML = `
                        <a href="${link.url}" target="_blank" class="text-center w-full">
                            <div class="text-white font-bold text-lg group-hover:text-blue-400 truncate">${link.name}</div>
                            <div class="text-[9px] text-gray-700 truncate mt-1">${link.url.replace('https://','')}</div>
                        </a>
                        ${isAdmin ? `<button onclick="deleteLink(${index})" class="absolute top-2 right-2 text-gray-800 hover:text-red-500 p-2"><i class="fas fa-times text-[10px]"></i></button>` : ''}
                    `;
                    grid.appendChild(card);
                });
                groupDiv.appendChild(grid);
                container.appendChild(groupDiv);
            });
        }

        function deleteLink(index) {
            if(confirm("Supprimer ce lien ?")) {
                allLinks.splice(index, 1);
                saveData();
            }
        }

        // --- ÉVÉNEMENTS ---
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();

            document.getElementById('goToLoginBtn').onclick = () => document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('cancelLogin').onclick = () => document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('addBtn').onclick = () => document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('closeAddBtn').onclick = () => document.getElementById('addModal').classList.add('hidden');
            
            document.getElementById('logoutBtn').onclick = () => {
                isAdmin = false;
                sessionStorage.removeItem('is_admin');
                updateUI();
            };

            document.getElementById('submitLogin').onclick = () => {
                const u = document.getElementById('loginUser').value;
                const p = document.getElementById('loginPass').value;
                if (u === "admin" && p === "admin") {
                    isAdmin = true;
                    sessionStorage.setItem('is_admin', 'true');
                    document.getElementById('loginPage').classList.add('hidden');
                    updateUI();
                } else {
                    document.getElementById('loginError').classList.remove('hidden');
                }
            };

            document.getElementById('saveLinkBtn').onclick = () => {
                const name = document.getElementById('siteName').value;
                const url = document.getElementById('siteUrl').value;
                const category = document.getElementById('siteCategory').value;
                if (name && url) {
                    allLinks.push({ name, url, category });
                    saveData();
                    document.getElementById('addModal').classList.add('hidden');
                    document.getElementById('siteName').value = "";
                    document.getElementById('siteUrl').value = "";
                }
            };

            document.getElementById('searchInput').oninput = (e) => renderLinks(e.target.value);
        });
    </script>
</body>
</html>
